<head>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'nb-yellow':   '#FFE566',
                        'nb-peach':    '#FFB4A2',
                        'nb-mint':     '#B5EAD7',
                        'nb-lavender': '#C7B8EA',
                        'nb-sky':      '#A8D8EA',
                        'nb-ink':      '#1A1A2E',
                        'nb-ink2':     '#16213E',
                        'nb-cream':    '#FFFBF0',
                        'nb-card':     '#F5F0E8',
                    },
                    fontFamily: {
                        'display': ['Space Grotesk', 'sans-serif'],
                        'body': ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --nb-shadow-sm:  3px 3px 0 #1A1A2E;
            --nb-shadow-md:  5px 5px 0 #1A1A2E;
            --nb-shadow-lg:  8px 8px 0 #1A1A2E;
            --nb-shadow-xl: 12px 12px 0 #1A1A2E;
        }
        .dark {
            --nb-shadow-sm:  3px 3px 0 #FFE566;
            --nb-shadow-md:  5px 5px 0 #FFE566;
            --nb-shadow-lg:  8px 8px 0 #FFE566;
            --nb-shadow-xl: 12px 12px 0 #FFE566;
        }

        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        h1, h2, h3, h4, .font-display { font-family: 'Space Grotesk', sans-serif; }
        * { word-wrap: break-word; }
        img { max-width: 100%; }

        .nb-nav { border-bottom: 3px solid #1A1A2E; }
        .dark .nb-nav { border-bottom-color: #FFE566; }

        .nb-divider { border-top: 3px solid #1A1A2E; }
        .dark .nb-divider { border-top-color: #FFE566; }

        .nb-badge {
            border: 2px solid #1A1A2E;
            box-shadow: 2px 2px 0 #1A1A2E;
            font-weight: 900;
        }
        .dark .nb-badge { border-color: #FFE566; box-shadow: 2px 2px 0 #FFE566; }

        .portfolio-card {
            border: 3px solid #1A1A2E;
            box-shadow: var(--nb-shadow-md);
            transition: box-shadow 0.15s ease, transform 0.15s ease;
            border-radius: 16px;
        }
        .dark .portfolio-card { border-color: #FFE566; }
        .portfolio-card:hover { box-shadow: var(--nb-shadow-xl); transform: translate(-4px,-4px); }

        .skill-tag {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 100px; font-size: 0.8rem;
            font-weight: 800; border: 2px solid #1A1A2E;
            box-shadow: 2px 2px 0 #1A1A2E; background: #FFFBF0; color: #1A1A2E;
        }
        .dark .skill-tag { background: #1A1A2E; color: #FFE566; border-color: #FFE566; box-shadow: 2px 2px 0 #FFE566; }

        .nb-stripe {
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 10px,
                rgba(26,26,46,0.035) 10px, rgba(26,26,46,0.035) 11px
            );
        }
        .dark .nb-stripe {
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 10px,
                rgba(255,229,102,0.04) 10px, rgba(255,229,102,0.04) 11px
            );
        }

        .filter-btn { border: 3px solid #1A1A2E; box-shadow: var(--nb-shadow-sm); font-weight: 800; transition: box-shadow 0.12s, transform 0.12s; background: #FFFBF0; color: #1A1A2E; }
        .dark .filter-btn { border-color: #FFE566; background: #16213E; color: #FFFBF0; }
        .filter-btn:hover { box-shadow: var(--nb-shadow-md); transform: translate(-2px,-2px); }
        .filter-btn.active { background: #FFE566; color: #1A1A2E; box-shadow: var(--nb-shadow-sm); transform: translate(1px,1px); }
        .dark .filter-btn.active { background: #FFE566; color: #1A1A2E; }

        .play-btn { border: 3px solid #1A1A2E; box-shadow: 3px 3px 0 #1A1A2E; transition: all 0.15s; background: #FFE566; color: #1A1A2E; }
        .dark .play-btn { border-color: #FFE566; box-shadow: 3px 3px 0 #FFE566; }
        .portfolio-card:hover .play-btn { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 #1A1A2E; }
        .dark .portfolio-card:hover .play-btn { box-shadow: 5px 5px 0 #FFE566; }

        #mobile-menu { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, opacity 0.3s ease; opacity: 0; }
        #mobile-menu.open { max-height: 500px; opacity: 1; }
        #projects-grid { transition: opacity 0.2s ease; }
    </style>
</head>

                    <a href="../video.html" class="px-3 py-1 bg-nb-mint text-nb-ink rounded-md font-black text-sm border-2 border-nb-ink" style="box-shadow: 2px 2px 0 #1A1A2E">عربي</a>
                    <button id="theme-toggle" class="p-2 rounded-lg bg-nb-yellow dark:bg-nb-ink2 text-nb-ink dark:text-nb-yellow" style="border:2px solid #1A1A2E;box-shadow:2px 2px 0 #1A1A2E" aria-label="Toggle theme">
                        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>

                    <svg id="close-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="md:hidden bg-nb-cream dark:bg-nb-ink2" style="border-top:3px solid #1A1A2E">
            <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-2">
                <a href="index.html" class="py-2 px-3 rounded-lg text-nb-ink dark:text-nb-cream hover:bg-nb-yellow dark:hover:bg-nb-ink font-bold transition">Home</a>
                <a href="../video.html" class="py-2 px-3 rounded-lg text-nb-ink dark:text-nb-cream hover:bg-nb-yellow dark:hover:bg-nb-ink font-bold transition">عربي</a>
                <div class="flex items-center gap-3 pt-2" style="border-top:2px solid rgba(26,26,46,0.2)">
                    <button id="mobile-theme-toggle" class="p-2 rounded-lg bg-nb-yellow dark:bg-nb-ink2 text-nb-ink dark:text-nb-yellow nb-badge" aria-label="Toggle theme">
                        <svg class="theme-dark-icon w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        <svg class="theme-light-icon hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>

    <header class="bg-nb-cream dark:bg-nb-ink py-16 nb-divider nb-stripe transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <span class="inline-block nb-badge px-4 py-1.5 text-xs rounded-full bg-nb-yellow dark:bg-nb-ink2 text-nb-ink dark:text-nb-yellow mb-4 uppercase tracking-widest">My Work</span>
            <h1 class="text-4xl md:text-5xl font-display font-black text-nb-ink dark:text-nb-cream mb-4">Video & Motion Graphics</h1>
            <p class="text-base font-medium text-nb-ink/70 dark:text-nb-cream/70 max-w-xl mx-auto leading-relaxed">
                Reels, promos, beat-synced cuts, and motion graphics — built to stop the scroll and drive action.
            </p>
        </div>
    </header>

    <section class="py-16 bg-nb-card dark:bg-nb-ink2 min-h-[50vh]">
        <div class="max-w-6xl mx-auto px-4">
            <div id="filter-container" class="flex flex-wrap justify-center gap-3 mb-12"></div>
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <div id="video-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-nb-ink/90 dark:bg-black/90 backdrop-blur-sm p-4 md:p-12 opacity-0 transition-opacity duration-300">
        <div id="modal-content" class="relative w-full max-w-5xl mx-auto aspect-video bg-nb-ink rounded-2xl overflow-hidden scale-95 transition-transform duration-300" style="border: 4px solid #FFE566; box-shadow: 12px 12px 0 #FFE566;">
            <button id="close-modal-btn" class="absolute -top-4 -right-4 z-20 w-12 h-12 bg-nb-peach text-nb-ink rounded-full flex items-center justify-center border-4 border-nb-ink hover:scale-110 transition-transform" style="box-shadow: 4px 4px 0 #1A1A2E;">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <iframe id="youtube-iframe" class="w-full h-full relative z-10" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <script src="../assets/js/projects-data.js"></script>
    <script>
        const currentLang = "en";
        
        const applyTheme = (isDark) => {
            isDark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
        };

        const syncThemeIcons = () => {
            const dark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-toggle-dark-icon')?.classList.toggle('hidden', dark);
            document.getElementById('theme-toggle-light-icon')?.classList.toggle('hidden', !dark);
            document.querySelector('.theme-dark-icon')?.classList.toggle('hidden', dark);
            document.querySelector('.theme-light-icon')?.classList.toggle('hidden', !dark);
        };

        applyTheme(localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches));
        syncThemeIcons();

        document.getElementById('theme-toggle')?.addEventListener('click', () => { applyTheme(!document.documentElement.classList.contains('dark')); syncThemeIcons(); });
        document.getElementById('mobile-theme-toggle')?.addEventListener('click', () => { applyTheme(!document.documentElement.classList.contains('dark')); syncThemeIcons(); });

        document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
            const menu = document.getElementById('mobile-menu');
            const hamburger = document.getElementById('hamburger-icon');
            const closeIcon = document.getElementById('close-icon');
            menu.classList.toggle('open');
            hamburger?.classList.toggle('hidden');
            closeIcon?.classList.toggle('hidden');
        });

        /* ── Modal Logic ── */
        function openModal(youtubeId) {
            const modal = document.getElementById('video-modal'), content = document.getElementById('modal-content');
            document.getElementById('youtube-iframe').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0`;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            requestAnimationFrame(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); });
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('video-modal'), content = document.getElementById('modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden'); modal.classList.remove('flex');
                document.getElementById('youtube-iframe').src = ''; document.body.style.overflow = '';
            }, 300);
        }
        document.getElementById('close-modal-btn').addEventListener('click', closeModal);
        document.getElementById('video-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape' && !document.getElementById('video-modal').classList.contains('hidden')) closeModal(); });

        /* ── Rendering ── */
        document.addEventListener('DOMContentLoaded', () => {
            const gridContainer = document.getElementById('projects-grid');
            const filterContainer = document.getElementById('filter-container');

            if (typeof videoProjects === 'undefined' || videoProjects.length === 0) {
                gridContainer.innerHTML = `<div class="col-span-full text-center py-24"><div class="w-16 h-16 bg-nb-yellow border-4 border-nb-ink rounded-2xl flex items-center justify-center mx-auto mb-5 text-3xl" style="box-shadow: 4px 4px 0 #1A1A2E;">🎬</div><h3 class="text-xl font-display font-black text-nb-ink dark:text-nb-cream mb-2">No projects yet</h3></div>`;
                return;
            }

            const uniqueNiches = [...new Set(videoProjects.map(p => getText(p.niche, currentLang)).filter(Boolean))];
            let buttonsHTML = `<button class="filter-btn active px-6 py-2.5 rounded-full text-sm" data-filter="all">All (${videoProjects.length})</button>`;
            uniqueNiches.forEach(niche => {
                const count = videoProjects.filter(p => getText(p.niche, currentLang) === niche).length;
                buttonsHTML += `<button class="filter-btn px-6 py-2.5 rounded-full text-sm" data-filter="${niche}">${niche} <span class="opacity-60 font-bold">(${count})</span></button>`;
            });
            filterContainer.innerHTML = buttonsHTML;

            function renderProjects(filterValue) {
                gridContainer.style.opacity = '0';
                setTimeout(() => {
                    gridContainer.innerHTML = '';
                    const filtered = filterValue === 'all' ? videoProjects : videoProjects.filter(p => getText(p.niche, currentLang) === filterValue);
                    
                    filtered.forEach(project => {
                        const title = getText(project.title, currentLang);
                        const desc = getText(project.shortDescription, currentLang);
                        const nicheBadge = getText(project.niche, currentLang);
                        const thumb = project.thumbnail ? `../${project.thumbnail}` : getYoutubeThumbnail(project.youtubeId);
                        const toolsHTML = (project.tools || []).map(t => `<span class="skill-tag">${t}</span>`).join('');

                        gridContainer.innerHTML += `
                            <div onclick="openModal('${project.youtubeId}')" class="portfolio-card group cursor-pointer bg-nb-cream dark:bg-nb-ink p-4 flex flex-col h-full relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-full h-2.5 bg-nb-yellow"></div>
                                ${nicheBadge ? `<span class="absolute top-6 left-6 z-10 bg-nb-ink text-nb-yellow text-xs font-black px-3 py-1 border-2 border-nb-yellow" style="box-shadow: 2px 2px 0 #FFE566;">${nicheBadge}</span>` : ''}
                                
                                <div class="aspect-video overflow-hidden relative bg-nb-ink rounded-xl border-2 border-nb-ink dark:border-nb-yellow mt-2" style="box-shadow: 3px 3px 0 currentColor;">
                                    <img src="${thumb}" alt="${title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-90 group-hover:opacity-100" loading="lazy">
                                    <div class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-300 flex items-center justify-center">
                                        <div class="play-btn w-14 h-14 rounded-full flex items-center justify-center">
                                            <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                                        </div>
                                    </div>
                                </div>
                                <div class="pt-5 pb-2 flex-grow flex flex-col">
                                    <h3 class="text-xl font-display font-black text-nb-ink dark:text-nb-cream mb-2 leading-snug">${title}</h3>
                                    <p class="text-sm font-medium text-nb-ink/70 dark:text-nb-cream/70 leading-relaxed mb-4 flex-grow">${desc}</p>
                                    ${toolsHTML ? `<div class="flex flex-wrap gap-1.5">${toolsHTML}</div>` : ''}
                                </div>
                            </div>`;
                    });
                    gridContainer.style.opacity = '1';
                }, 180);
            }

            filterContainer.addEventListener('click', e => {
                if (!e.target.classList.contains('filter-btn')) return;
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                renderProjects(e.target.getAttribute('data-filter'));
            });

            renderProjects('all');
        });
    </script>
</body>
