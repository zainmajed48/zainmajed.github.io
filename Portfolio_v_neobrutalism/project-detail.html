<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تفاصيل المشروع — زين الدين ماجد.">
    <meta property="og:title" content="تفاصيل المشروع | زين الدين ماجد">
    <meta property="og:description" content="اطلع على تفاصيل المشروع، التحدي، الحل، والنتائج.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/images/og-cover.jpg">
    <meta property="og:locale" content="ar_AR">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>تفاصيل المشروع | زين الدين ماجد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'nb-yellow':   '#FFE566',
                        'nb-peach':    '#FFB4A2',
                        'nb-mint':     '#B5EAD7',
                        'nb-lavender': '#C7B8EA',
                        'nb-sky':      '#A8D8EA',
                        'nb-ink':      '#1A1A2E',
                        'nb-ink2':     '#16213E',
                        'nb-cream':    '#FFFBF0',
                        'nb-card':     '#F5F0E8',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --nb-shadow-sm:  3px 3px 0 #1A1A2E;
            --nb-shadow-md:  5px 5px 0 #1A1A2E;
            --nb-shadow-lg:  8px 8px 0 #1A1A2E;
            --nb-shadow-xl: 12px 12px 0 #1A1A2E;
        }
        .dark {
            --nb-shadow-sm:  3px 3px 0 #FFE566;
            --nb-shadow-md:  5px 5px 0 #FFE566;
            --nb-shadow-lg:  8px 8px 0 #FFE566;
            --nb-shadow-xl: 12px 12px 0 #FFE566;
        }

        body { font-family: 'Noto Sans Arabic', sans-serif; overflow-x: hidden; }
        * { word-wrap: break-word; }
        img { max-width: 100%; }

        .nb-nav { border-bottom: 3px solid #1A1A2E; }
        .dark .nb-nav { border-bottom-color: #FFE566; }

        .nb-divider { border-top: 3px solid #1A1A2E; }
        .dark .nb-divider { border-top-color: #FFE566; }

        .nb-badge {
            border: 2px solid #1A1A2E;
            box-shadow: 2px 2px 0 #1A1A2E;
            font-weight: 900;
        }
        .dark .nb-badge { border-color: #FFE566; box-shadow: 2px 2px 0 #FFE566; }

        .nb-card {
            border: 3px solid #1A1A2E;
            box-shadow: var(--nb-shadow-md);
            border-radius: 14px;
        }
        .dark .nb-card { border-color: #FFE566; }

        .nb-btn {
            border: 3px solid #1A1A2E;
            box-shadow: var(--nb-shadow-md);
            font-weight: 900;
            transition: box-shadow 0.12s, transform 0.12s;
            background: #FFE566; color: #1A1A2E;
        }
        .dark .nb-btn { border-color: #FFE566; }
        .nb-btn:hover { box-shadow: var(--nb-shadow-lg); transform: translate(-2px,-2px); }
        .nb-btn:active { box-shadow: 1px 1px 0 #1A1A2E; transform: translate(2px,2px); }
        .dark .nb-btn:active { box-shadow: 1px 1px 0 #FFE566; }

        .nb-btn-ghost {
            border: 3px solid #1A1A2E;
            box-shadow: var(--nb-shadow-sm);
            font-weight: 900;
            transition: box-shadow 0.12s, transform 0.12s;
            background: #FFFBF0; color: #1A1A2E;
        }
        .dark .nb-btn-ghost { border-color: #FFE566; background: #16213E; color: #FFFBF0;}
        .nb-btn-ghost:hover { box-shadow: var(--nb-shadow-md); transform: translate(-2px,-2px); }

        .skill-tag {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 100px; font-size: 0.8rem;
            font-weight: 800; border: 2px solid #1A1A2E;
            box-shadow: 2px 2px 0 #1A1A2E; background: #FFFBF0; color: #1A1A2E;
        }
        .dark .skill-tag { background: #1A1A2E; color: #FFE566; border-color: #FFE566; box-shadow: 2px 2px 0 #FFE566; }

        .nb-stripe {
            background-image: repeating-linear-gradient(
                -45deg, transparent, transparent 10px,
                rgba(26,26,46,0.035) 10px, rgba(26,26,46,0.035) 11px
            );
        }
        .dark .nb-stripe {
            background-image: repeating-linear-gradient(
                -45deg, transparent, transparent 10px,
                rgba(255,229,102,0.04) 10px, rgba(255,229,102,0.04) 11px
            );
        }

        #mobile-menu { max-height: 0; overflow: hidden; transition: max-height 0.35s ease, opacity 0.3s ease; opacity: 0; }
        #mobile-menu.open { max-height: 500px; opacity: 1; }
    </style>
</head>
<body class="bg-nb-cream text-nb-ink dark:bg-nb-ink dark:text-nb-cream antialiased transition-colors duration-300">

    <nav class="nb-nav bg-nb-cream/98 dark:bg-nb-ink2/95 backdrop-blur-sm sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="font-black text-2xl tracking-tight text-nb-ink dark:text-nb-yellow">
                    <span style="text-decoration: underline; text-decoration-color: #FFE566; text-underline-offset: 6px; text-decoration-thickness: 4px;">زين.</span>
                </a>
                <div class="hidden md:flex gap-8 items-center">
                    <a href="index.html" class="text-nb-ink dark:text-nb-cream hover:text-nb-ink dark:hover:text-nb-yellow font-bold text-sm transition">الرئيسية</a>
                    <a href="index.html#portfolio" class="text-nb-ink dark:text-nb-yellow font-bold text-sm">أعمالي</a>
                    <a href="#" id="lang-switch" class="px-3 py-1 bg-nb-mint text-nb-ink rounded-md font-black text-sm border-2 border-nb-ink" style="box-shadow: 2px 2px 0 #1A1A2E">English</a>
                    <button id="theme-toggle" class="p-2 rounded-lg bg-nb-yellow dark:bg-nb-ink2 text-nb-ink dark:text-nb-yellow" style="border:2px solid #1A1A2E;box-shadow:2px 2px 0 #1A1A2E" aria-label="Toggle theme">
                        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg bg-nb-yellow dark:bg-nb-ink2 text-nb-ink dark:text-nb-yellow" style="border:2px solid #1A1A2E;box-shadow:2px 2px 0 #1A1A2E">
                    <svg id="hamburger-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    <svg id="close-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="md:hidden bg-nb-cream dark:bg-nb-ink2" style="border-top:3px solid #1A1A2E">
            <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-2">
                <a href="index.html" class="py-2 px-3 rounded-lg text-nb-ink dark:text-nb-cream hover:bg-nb-yellow dark:hover:bg-nb-ink font-bold transition">الرئيسية</a>
                <a href="#" id="mobile-lang-switch" class="py-2 px-3 rounded-lg text-nb-ink dark:text-nb-cream hover:bg-nb-yellow dark:hover:bg-nb-ink font-bold transition">English</a>
                <div class="flex items-center gap-3 pt-2" style="border-top:2px solid rgba(26,26,46,0.2)">
                    <button id="mobile-theme-toggle" class="p-2 rounded-lg bg-nb-yellow dark:bg-nb-ink2 text-nb-ink dark:text-nb-yellow nb-badge" aria-label="Toggle theme">
                        <svg class="theme-dark-icon w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        <svg class="theme-light-icon hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div id="error-container" class="hidden max-w-4xl mx-auto px-4 py-24 text-center">
        <h2 class="text-3xl font-black text-nb-ink dark:text-nb-cream mb-4">المشروع غير موجود</h2>
        <a href="index.html" class="inline-block nb-btn px-8 py-3 rounded-xl text-center">العودة للرئيسية</a>
    </div>

    <div id="project-container" class="hidden">
        <header class="bg-nb-cream dark:bg-nb-ink pt-16 pb-24 nb-divider nb-stripe">
            <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center md:text-right">
                <span id="project-category" class="inline-flex items-center px-4 py-1.5 bg-nb-sky dark:bg-nb-ink2 text-nb-ink dark:text-nb-yellow rounded-full text-xs font-black border-2 border-nb-ink dark:border-nb-yellow mb-6" style="box-shadow: 2px 2px 0 currentColor;"></span>
                <h1 id="project-title" class="text-4xl md:text-5xl lg:text-6xl font-black mb-6 text-nb-ink dark:text-nb-cream leading-tight bg-white dark:bg-nb-ink inline-block px-4 py-2 border-4 border-nb-ink dark:border-nb-yellow" style="box-shadow: 8px 8px 0 currentColor;"></h1>
                <p id="project-desc" class="text-lg md:text-xl font-medium text-nb-ink/80 dark:text-nb-cream/80 max-w-3xl leading-relaxed mt-4 bg-white/80 dark:bg-nb-ink2/80 p-4 border-2 border-nb-ink dark:border-nb-yellow"></p>
            </div>
        </header>

        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16 -mt-20">
            <div class="mb-20">
                <div class="nb-card overflow-hidden bg-nb-ink mb-6 aspect-video relative z-10" style="box-shadow: var(--nb-shadow-xl);">
                    <img id="main-image" src="" class="w-full h-full object-cover transition-opacity duration-300">
                </div>
                <div id="thumbnails-container" class="flex gap-4 overflow-x-auto pb-4 hide-scrollbar"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 lg:gap-16">
                <div class="lg:col-span-2 space-y-12">
                    <section class="bg-white dark:bg-nb-ink2 p-8 border-4 border-nb-ink dark:border-nb-yellow" style="box-shadow: var(--nb-shadow-md);">
                        <h2 class="text-2xl font-black text-nb-ink dark:text-nb-yellow mb-5 inline-block border-b-4 border-nb-ink dark:border-nb-yellow pb-2">التحدي</h2>
                        <p id="project-challenge" class="text-nb-ink/90 dark:text-nb-cream/90 font-medium leading-relaxed"></p>
                    </section>
                    <section class="bg-white dark:bg-nb-ink2 p-8 border-4 border-nb-ink dark:border-nb-yellow" style="box-shadow: var(--nb-shadow-md);">
                        <h2 class="text-2xl font-black text-nb-ink dark:text-nb-yellow mb-5 inline-block border-b-4 border-nb-ink dark:border-nb-yellow pb-2">الحل</h2>
                        <p id="project-solution" class="text-nb-ink/90 dark:text-nb-cream/90 font-medium leading-relaxed"></p>
                    </section>
                    <section class="bg-white dark:bg-nb-ink2 p-8 border-4 border-nb-ink dark:border-nb-yellow" style="box-shadow: var(--nb-shadow-md);">
                        <h2 class="text-2xl font-black text-nb-ink dark:text-nb-yellow mb-5 inline-block border-b-4 border-nb-ink dark:border-nb-yellow pb-2">النتائج</h2>
                        <ul id="project-results" class="space-y-4"></ul>
                    </section>
                </div>
                <div class="space-y-8">
                    <div class="bg-nb-card dark:bg-nb-ink2 p-8 border-4 border-nb-ink dark:border-nb-yellow" style="box-shadow: var(--nb-shadow-sm);">
                        <h3 class="text-xl font-black text-nb-ink dark:text-nb-cream mb-5">الأدوات المستخدمة</h3>
                        <div id="project-tools" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div id="project-links" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/projects-data.js"></script>
    <script>
        const currentLang = "ar";

        const applyTheme = (isDark) => {
            isDark ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
            localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
        };

        const syncThemeIcons = () => {
            const dark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-toggle-dark-icon')?.classList.toggle('hidden', dark);
            document.getElementById('theme-toggle-light-icon')?.classList.toggle('hidden', !dark);
            document.querySelector('.theme-dark-icon')?.classList.toggle('hidden', dark);
            document.querySelector('.theme-light-icon')?.classList.toggle('hidden', !dark);
        };

        applyTheme(localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches));
        syncThemeIcons();

        document.getElementById('theme-toggle')?.addEventListener('click', () => { applyTheme(!document.documentElement.classList.contains('dark')); syncThemeIcons(); });
        document.getElementById('mobile-theme-toggle')?.addEventListener('click', () => { applyTheme(!document.documentElement.classList.contains('dark')); syncThemeIcons(); });

        document.getElementById('mobile-menu-btn')?.addEventListener('click', () => {
            const menu = document.getElementById('mobile-menu');
            const hamburger = document.getElementById('hamburger-icon');
            const closeIcon = document.getElementById('close-icon');
            menu.classList.toggle('open');
            hamburger?.classList.toggle('hidden');
            closeIcon?.classList.toggle('hidden');
        });

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            const project = typeof findProjectById !== 'undefined' ? findProjectById(projectId) : null;
            
            if(projectId) {
                document.getElementById('lang-switch').href = `en/project-detail.html?id=${projectId}`;
                document.getElementById('mobile-lang-switch').href = `en/project-detail.html?id=${projectId}`;
            }

            if (!project) { document.getElementById('error-container').classList.remove('hidden'); return; }
            
            document.getElementById('project-container').classList.remove('hidden');
            document.getElementById('project-title').textContent = getText(project.title, currentLang);
            document.getElementById('project-desc').textContent = getText(project.shortDescription, currentLang);
            document.getElementById('project-challenge').textContent = getText(project.challenge, currentLang);
            document.getElementById('project-solution').textContent = getText(project.solution, currentLang);
            
            const catLabels = { 'marketing': 'التسويق الرقمي', 'engineering': 'المشاريع الهندسية', 'video': 'الفيديو والموشن' };
            document.getElementById('project-category').textContent = catLabels[project.category] || project.category;

            const resultsList = document.getElementById('project-results');
            (project.results[currentLang] || []).forEach(r => {
                resultsList.innerHTML += `<li class="flex items-start gap-3 text-nb-ink dark:text-nb-cream font-bold"><span class="text-nb-ink dark:text-nb-yellow text-xl" style="line-height:1; text-shadow: 1px 1px 0 currentColor;">➔</span> ${r}</li>`;
            });

            const toolsContainer = document.getElementById('project-tools');
            (project.tools || []).forEach(t => {
                toolsContainer.innerHTML += `<span class="skill-tag">${t}</span>`;
            });

            const linksContainer = document.getElementById('project-links');
            if (project.externalLink) linksContainer.innerHTML += `<a href="${project.externalLink}" target="_blank" class="nb-btn flex justify-center w-full px-8 py-4 rounded-xl text-center font-black text-lg block">زيارة المشروع</a>`;
            if (project.githubLink) linksContainer.innerHTML += `<a href="${project.githubLink}" target="_blank" class="nb-btn-ghost flex justify-center w-full px-8 py-4 rounded-xl text-center font-black text-lg block" dir="ltr">GitHub Repository</a>`;

            const images = project.gallery?.length ? project.gallery : [project.thumbnail];
            const mainImg = document.getElementById('main-image');
            if (images.length) {
                mainImg.src = images[0];
                const thumbs = document.getElementById('thumbnails-container');
                if (images.length > 1) {
                    images.forEach((img, i) => {
                        const btn = document.createElement('button');
                        btn.className = `flex-shrink-0 w-28 h-20 bg-nb-ink overflow-hidden border-4 transition-all ${i===0 ? 'border-nb-yellow opacity-100 scale-105 shadow-[4px_4px_0_#1A1A2E]' : 'border-nb-ink dark:border-white opacity-60'}`;
                        btn.innerHTML = `<img src="${img}" class="w-full h-full object-cover">`;
                        btn.onclick = () => {
                            mainImg.style.opacity = '0.3'; setTimeout(() => { mainImg.src = img; mainImg.style.opacity = '1'; }, 150);
                            Array.from(thumbs.children).forEach(c => { c.className = 'flex-shrink-0 w-28 h-20 bg-nb-ink overflow-hidden border-4 transition-all border-nb-ink dark:border-white opacity-60'; });
                            btn.className = 'flex-shrink-0 w-28 h-20 bg-nb-ink overflow-hidden border-4 transition-all border-nb-yellow opacity-100 scale-105 shadow-[4px_4px_0_#1A1A2E]';
                        };
                        thumbs.appendChild(btn);
                    });
                }
            }
        });
    </script>
</body>
</html>
